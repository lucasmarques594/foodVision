services:
  api:
    build: ./backend
    container_name: foodvision_api
    ports:
      - "8080:8080" 
    env_file:
      - ./backend/.env
    depends_on:
      - db
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    build: ./frontend
    container_name: foodvision_frontend
    ports:
      - "3001:3000" 
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  db:
    image: postgres:15-alpine
    container_name: foodvision_db
    ports:
      - "5432:5432"
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  nginx:
    image: nginx:1.25-alpine
    container_name: foodvision_nginx
    ports:
      - "3000:3000" 
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
      - frontend

volumes:
  postgres_data: